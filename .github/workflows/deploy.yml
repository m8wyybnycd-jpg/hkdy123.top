name: Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings=0
        continue-on-error: true

      - name: Test
        # Tests are authored with Node's native `node:test` runner (see headers in
        # tests/*.test.ts). vitest cannot collect them, so previously this step was a
        # vacuous green ("No test suite found"). Run them with tsx so the gate is real.
        # Hard gate: a test failure now blocks the deploy (no continue-on-error).
        run: npx tsx --test "tests/**/*.test.ts" "tests/**/*.test.mjs"

      - name: Build
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Rename SPA shell to spa-shell (prevents Cloudflare 308 loop)
        # The React SPA is built to dist/app/index.html. Cloudflare Pages' clean-URL
        # feature 308-redirects /app <-> /app.html, causing an infinite loop.
        # Renaming to an extension-less file (dist/spa-shell) bypasses clean-URL and
        # is served by functions/app/[[path]].ts via env.ASSETS.fetch (no static
        # .html collision). This MUST run before deploy or the live site 308-loops.
        run: mv dist/app/index.html dist/spa-shell && rm -rf dist/app

      - name: Deploy to Cloudflare Pages (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name=cloudgame-hub --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Seed D1 permissions (idempotent)
        # 补齐后台权限行（如宠物管理 pet:view / pet:manage）。
        # 使用 INSERT OR IGNORE，可重复执行；即便 token 缺 D1 权限也绝不阻塞部署。
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: npx wrangler d1 execute cloudgame-hub-db --file=./migrations/schema-pet-permissions.sql --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name=cloudgame-hub --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
