name: Build & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint src/ --max-warnings=0
        continue-on-error: true

      - name: Test
        run: npx vitest run --reporter=verbose
        continue-on-error: true

      - name: Build
        run: npx vite build
        env:
          NODE_ENV: production

      - name: Rename SPA shell to spa-shell (prevents Cloudflare 308 loop)
        # The React SPA is built to dist/app/index.html. Cloudflare Pages' clean-URL
        # feature 308-redirects /app <-> /app.html, causing an infinite loop.
        # Renaming to an extension-less file (dist/spa-shell) bypasses clean-URL and
        # is served by functions/app/[[path]].ts via env.ASSETS.fetch (no static
        # .html collision). This MUST run before deploy or the live site 308-loops.
        run: mv dist/app/index.html dist/spa-shell && rm -rf dist/app

      - name: Deploy to Cloudflare Pages (Production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name=cloudgame-hub --branch=main
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'push' && github.ref != 'refs/heads/main'
        run: npx wrangler pages deploy dist --project-name=cloudgame-hub --branch=${{ github.ref_name }}
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
